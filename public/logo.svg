<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1f0a" />
      <stop offset="100%" stop-color="#020802" />
    </radialGradient>
    
    <!-- Neon green glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#003300" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.4" />

  <!-- Outer Neon Frame -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#39ff14" stroke-width="4" filter="url(#glow)" rx="20" />
  <rect x="28" y="28" width="456" height="456" fill="none" stroke="#005500" stroke-width="2" rx="16" />

  <!-- Radar/Scanner Line -->
  <line x1="20" y1="256" x2="492" y2="256" stroke="#39ff14" stroke-width="1.5" opacity="0.3" filter="url(#glow)" />

  <!-- Briefcase (Suitcase of Kombinator) -->
  <g transform="translate(128, 140)" filter="url(#glow)">
    <!-- Briefcase Handle -->
    <path d="M 86,20 L 86,0 C 86,-8 96,-12 110,-12 L 146,-12 C 160,-12 170,-8 170,0 L 170,20" fill="none" stroke="#39ff14" stroke-width="12" stroke-linecap="round" />
    
    <!-- Briefcase Body -->
    <rect x="0" y="20" width="256" height="180" rx="12" fill="#000000" stroke="#39ff14" stroke-width="12" />
    
    <!-- Metal corner reinforcements -->
    <path d="M 0,50 L 0,20 L 30,20" fill="none" stroke="#39ff14" stroke-width="6" />
    <path d="M 256,50 L 256,20 L 226,20" fill="none" stroke="#39ff14" stroke-width="6" />
    <path d="M 0,170 L 0,200 L 30,200" fill="none" stroke="#39ff14" stroke-width="6" />
    <path d="M 256,170 L 256,200 L 226,200" fill="none" stroke="#39ff14" stroke-width="6" />

    <!-- Latches / Locks -->
    <rect x="50" y="20" width="20" height="30" rx="4" fill="#000000" stroke="#39ff14" stroke-width="6" />
    <rect x="186" y="20" width="20" height="30" rx="4" fill="#000000" stroke="#39ff14" stroke-width="6" />

    <!-- Center Emblem - Dollar Sign (PRL/Transformacja symbol) -->
    <text x="128" y="130" font-family="monospace" font-size="76" font-weight="900" fill="#39ff14" text-anchor="middle" filter="url(#glow)">$</text>

    <!-- Dial / Combination wheels under latches -->
    <line x1="60" y1="60" x2="60" y2="70" stroke="#39ff14" stroke-width="4" />
    <line x1="196" y1="60" x2="196" y2="70" stroke="#39ff14" stroke-width="4" />
  </g>

  <!-- Big PLN/PLZ/USD Rising Graph under the briefcase -->
  <path d="M 40,440 L 140,380 L 220,410 L 320,320 L 400,350 L 472,240" fill="none" stroke="#39ff14" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Dots on the graph -->
  <circle cx="40" cy="440" r="8" fill="#111111" stroke="#39ff14" stroke-width="4" filter="url(#glow)" />
  <circle cx="140" cy="380" r="8" fill="#111111" stroke="#39ff14" stroke-width="4" filter="url(#glow)" />
  <circle cx="220" cy="410" r="8" fill="#111111" stroke="#39ff14" stroke-width="4" filter="url(#glow)" />
  <circle cx="320" cy="320" r="8" fill="#111111" stroke="#39ff14" stroke-width="4" filter="url(#glow)" />
  <circle cx="400" cy="350" r="8" fill="#111111" stroke="#39ff14" stroke-width="4" filter="url(#glow)" />
  <circle cx="472" cy="240" r="10" fill="#ffffff" stroke="#39ff14" stroke-width="5" filter="url(#glow)" />

  <!-- Retro Text Logo -->
  <text x="256" y="440" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="900" fill="#39ff14" letter-spacing="4" text-anchor="middle" filter="url(#glow)">KOMBINATOR 4.0</text>
  <text x="256" y="465" font-family="'Courier New', Courier, monospace" font-size="14" fill="#00aa00" letter-spacing="2" text-anchor="middle">DROGA DO WOLNOSCI</text>
</svg>
